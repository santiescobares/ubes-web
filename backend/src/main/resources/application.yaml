spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  flyway:
    enabled: false
    baseline-on-migrate: false

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      issuer: ubes-web
      access-expiration: 86400000
      registration-expiration: 900000

  google:
    client-id: ${GOOGLE_CLIENT_ID}

  r2:
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    endpoint: ${R2_ENDPOINT}
    buckets:
      private: ${R2_PRIVATE_BUCKET}
      public: ${R2_PUBLIC_BUCKET}

  logging:
    file:
      name: logs/backend.log
    pattern:
      file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [TraceID: %X{traceId}] %logger{36} - %msg%n"
      console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr([%thread]) %clr(%-5level) %clr([TraceID: %X{traceId}]){magenta} %clr(%logger{36}){cyan} - %msg%n"
    level:
      dev.santiescobares.ubesweb: INFO
      org.springframework: WARN
      org.hibernate: WARN
    logback:
      rollingpolicy:
        max-file-size: 10MB
        max-history: 30
        total-size-cap: 2GB